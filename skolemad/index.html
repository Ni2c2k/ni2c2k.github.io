<html>
<head>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      min-height: 200px;
      resize: vertical;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #d0d7de;
      font-size: 14px;
      font-family: monospace;
      line-height: 1.5;
      background: #f9fafb;
      transition: all 0.2s ease;
    }

    textarea:focus {
      outline: none;
      border-color: #4f8cff;
      box-shadow: 0 0 0 3px rgba(79,140,255,0.15);
      background: #fff;
    }

    button {
      margin-top: 16px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #4f8cff;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #3a6fd8;
    }

    button:active {
      transform: scale(0.98);
    }

    p {
      color: #555;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Create an ICS file with Skolemad-klub orders</h2>
    <p>Paste your Skolemad email below:</p>

    <textarea placeholder="Paste email content here..."></textarea>

    <button>Create ICS file</button>
  </div>

  <script type="module" src="./index.js"></script>
</body>
</html>
