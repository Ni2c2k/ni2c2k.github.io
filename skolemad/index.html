<html>
<head>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: "Roboto", "Noto Sans", sans-serif;
    background: linear-gradient(180deg, #121212, #1e1e1e);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    align-items: flex-start;
    padding: 20px;
    margin: 0;
    color: #e0e0e0;
  }

  .container {
    width: 100%;
    max-width: 700px;
    background: #1f1f1f;
    padding: 28px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }

  h2 {
    margin: 0 0 8px;
    font-size: 22px;
    line-height: 1.3;
    color: #ffffff;
  }

  p {
    color: #aaaaaa;
    margin-bottom: 16px;
    font-size: 14px;
  }

  textarea {
    width: 100%;
    min-height: 220px;
    resize: vertical;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid #333;
    font-size: 16px;
    font-family: monospace;
    line-height: 1.5;
    background: #2a2a2a;
    color: #e0e0e0;
    transition: all 0.2s ease;
  }

  textarea:focus {
    outline: none;
    border-color: #4f8cff;
    box-shadow: 0 0 0 4px rgba(79,140,255,0.25);
    background: #333;
  }

  button {
    margin-top: 18px;
    padding: 14px;
    width: 100%;
    border: none;
    border-radius: 12px;
    background: #4f8cff;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  button:hover {
    background: #3a6fd8;
  }

  button:active {
    transform: scale(0.98);
  }

  /* Mobile tweaks */
  @media (max-width: 600px) {
    body {
      padding: 12px;
    }

    .container {
      padding: 20px;
      border-radius: 14px;
    }

    h2 {
      font-size: 20px;
    }
  }
</style>
</head>

<body>
  <div class="container">
    <h2>Create an ICS file with Skolemad-klub orders</h2>
    <p>Paste your Skolemad email below:</p>

    <textarea placeholder="Paste email content here..."></textarea>

    <button>📅 Create ICS file</button>
  </div>

  <script type="module" src="./index.js"></script>
</body>
</html>
